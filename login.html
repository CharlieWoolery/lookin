<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Lookin — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080b0f;
      --surface: #0d1117;
      --card: #0f1318;
      --border: #1f2937;
      --border-light: #2d3748;
      --green: #4ade80;
      --green-glow: rgba(74, 222, 128, 0.12);
      --green-glow-strong: rgba(74, 222, 128, 0.22);
      --purple: #7c3aed;
      --purple-dim: #6d28d9;
      --purple-glow: rgba(124, 58, 237, 0.18);
      --text-primary: #f0ede8;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: var(--text-primary);
      overflow: hidden;
    }

    .screen {
      max-width: 430px;
      height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    /* ── Background glow blobs ── */
    .bg-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg-glow::before {
      content: '';
      position: absolute;
      top: -80px;
      left: -60px;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.18) 0%, transparent 70%);
      border-radius: 50%;
    }

    .bg-glow::after {
      content: '';
      position: absolute;
      bottom: 60px;
      right: -80px;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(74, 222, 128, 0.1) 0%, transparent 70%);
      border-radius: 50%;
    }

    /* ── Scroll wrapper ── */
    .scroll-body {
      position: relative;
      z-index: 1;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      padding: 0 24px 40px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .scroll-body::-webkit-scrollbar { display: none; }

    /* ── Logo block ── */
    .logo-block {
      padding-top: env(safe-area-inset-top, 20px);
      padding-top: max(env(safe-area-inset-top, 20px), 20px);
      text-align: center;
      margin-bottom: 8px;
    }

    .logo-wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 0.06em;
      line-height: 1;
      background: linear-gradient(135deg, #f0ede8 0%, #c4b5fd 60%, var(--green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: inline-block;
    }

    .logo-tag {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin-top: 2px;
    }

    /* ── Tab toggle ── */
    .tab-row {
      display: flex;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      padding: 3px;
      margin-bottom: 32px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 0;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      border-radius: var(--radius-full);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.22s ease;
    }

    .tab-btn.active {
      background: var(--purple);
      color: #fff;
      box-shadow: 0 2px 16px rgba(124, 58, 237, 0.45);
    }

    /* ── Form panels ── */
    .form-panels {
      position: relative;
      flex: 1;
    }

    .form-panel {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      opacity: 0;
      transform: translateX(32px);
      pointer-events: none;
      transition: opacity 0.28s ease, transform 0.28s ease;
    }

    .form-panel.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
      position: relative;
    }

    .form-panel.exit-left {
      opacity: 0;
      transform: translateX(-32px);
    }

    /* ── Inputs ── */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .field-wrap {
      position: relative;
    }

    .field-input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      font-size: 15px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
      -webkit-appearance: none;
    }

    .field-input::placeholder {
      color: var(--text-muted);
    }

    .field-input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px var(--purple-glow);
    }

    .field-input.has-icon {
      padding-right: 44px;
    }

    .field-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px;
      line-height: 0;
      transition: color 0.15s;
    }

    .field-icon:hover { color: var(--text-secondary); }

    /* ── Forgot password ── */
    .forgot-row {
      text-align: right;
      margin-top: -4px;
    }

    .forgot-link {
      font-size: 13px;
      color: var(--purple);
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: opacity 0.15s;
    }

    .forgot-link:hover { opacity: 0.75; }

    /* ── Primary CTA ── */
    .btn-primary {
      width: 100%;
      padding: 15px;
      border-radius: var(--radius-full);
      border: none;
      background: var(--purple);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-shadow: 0 4px 24px rgba(124, 58, 237, 0.4);
      margin-top: 4px;
    }

    .btn-primary:hover {
      background: var(--purple-dim);
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(124, 58, 237, 0.5);
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 2px 12px rgba(124, 58, 237, 0.35);
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    /* ── Social buttons ── */
    .social-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-social {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 16px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border-light);
      background: var(--card);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
    }

    .btn-social:hover {
      border-color: var(--border-light);
      background: #151d28;
      transform: translateY(-1px);
    }

    .btn-social:active { transform: translateY(0); }

    .social-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      line-height: 0;
    }

    /* ── Terms (sign up only) ── */
    .terms-text {
      font-size: 11.5px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
    }

    .terms-text a {
      color: var(--text-secondary);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── Bottom toggle link ── */
    .toggle-row {
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 28px;
    }

    .toggle-link {
      color: var(--green);
      font-weight: 600;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-size: inherit;
      transition: opacity 0.15s;
    }

    .toggle-link:hover { opacity: 0.75; }

    /* ── Name row (signup) ── */
    .name-row {
      display: flex;
      gap: 10px;
    }

    .name-row .field-group {
      flex: 1;
    }

    /* ── Error / success ── */
    .field-error {
      font-size: 12px;
      color: #f87171;
      padding: 0 2px;
    }

    /* ── Spinner ── */
    .btn-primary.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .btn-primary.loading .btn-text { display: none; }
    .btn-primary.loading .btn-spinner { display: inline-block; }

    .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="screen">
  <div class="bg-glow"></div>

  <div class="scroll-body">

    <!-- Logo -->
    <div class="logo-block">
      <div class="logo-wordmark">LOOKIN</div>
      <div class="logo-tag">Your AI-powered style guide</div>
    </div>

    <!-- Tab toggle -->
    <div class="tab-row" role="tablist">
      <button class="tab-btn active" id="tab-login" role="tab" aria-selected="true" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="tab-signup" role="tab" aria-selected="false" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- ── LOGIN PANEL ── -->
    <div class="form-panel active" id="panel-login">

      <div class="field-group">
        <label class="field-label" for="login-email">Email</label>
        <div class="field-wrap">
          <input class="field-input" type="email" id="login-email" placeholder="you@example.com" autocomplete="email" inputmode="email" />
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="login-password">Password</label>
        <div class="field-wrap">
          <input class="field-input has-icon" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
          <button class="field-icon" aria-label="Toggle password visibility" onclick="togglePw('login-password', this)">
            <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="forgot-row">
        <button class="forgot-link">Forgot password?</button>
      </div>

      <p id="login-error" style="color:#f87171;font-size:12px;margin:4px 0;display:none;text-align:left"></p>

      <button class="btn-primary" onclick="handleLogin()">
        <span class="btn-text">Sign In</span>
        <span class="btn-spinner"></span>
      </button>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">or continue with</span>
        <div class="divider-line"></div>
      </div>

      <div class="social-btns">
        <button class="btn-social" onclick="handleGoogle()">
          <span class="social-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
          </span>
          Sign in with Google
        </button>

        <button class="btn-social" onclick="handleApple()">
          <span class="social-icon">
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.33.07 2.26.73 3.04.78 1.15-.23 2.26-.91 3.46-.82 1.47.13 2.58.72 3.3 1.84-3.07 1.8-2.34 5.78.45 6.9-.57 1.47-1.3 2.93-2.25 4.18zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
            </svg>
          </span>
          Sign in with Apple
        </button>
      </div>

    </div><!-- /panel-login -->


    <!-- ── SIGN UP PANEL ── -->
    <div class="form-panel" id="panel-signup">

      <div class="name-row">
        <div class="field-group">
          <label class="field-label" for="signup-first">First name</label>
          <input class="field-input" type="text" id="signup-first" placeholder="Alex" autocomplete="given-name" />
        </div>
        <div class="field-group">
          <label class="field-label" for="signup-last">Last name</label>
          <input class="field-input" type="text" id="signup-last" placeholder="Chen" autocomplete="family-name" />
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="signup-email">Email</label>
        <input class="field-input" type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" inputmode="email" />
      </div>

      <div class="field-group">
        <label class="field-label" for="signup-password">Password</label>
        <div class="field-wrap">
          <input class="field-input has-icon" type="password" id="signup-password" placeholder="At least 8 characters" autocomplete="new-password" />
          <button class="field-icon" aria-label="Toggle password visibility" onclick="togglePw('signup-password', this)">
            <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <p id="signup-error" style="color:#f87171;font-size:12px;margin:4px 0;display:none;text-align:left"></p>

      <button class="btn-primary" onclick="handleSignup()">
        <span class="btn-text">Create Account</span>
        <span class="btn-spinner"></span>
      </button>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">or sign up with</span>
        <div class="divider-line"></div>
      </div>

      <div class="social-btns">
        <button class="btn-social" onclick="handleGoogle()">
          <span class="social-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
          </span>
          Continue with Google
        </button>

        <button class="btn-social" onclick="handleApple()">
          <span class="social-icon">
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.33.07 2.26.73 3.04.78 1.15-.23 2.26-.91 3.46-.82 1.47.13 2.58.72 3.3 1.84-3.07 1.8-2.34 5.78.45 6.9-.57 1.47-1.3 2.93-2.25 4.18zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
            </svg>
          </span>
          Continue with Apple
        </button>
      </div>

      <p class="terms-text">
        By creating an account you agree to our<br/>
        <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
      </p>

    </div><!-- /panel-signup -->

    <!-- Bottom toggle -->
    <div class="toggle-row" id="toggle-row">
      Don't have an account?
      <button class="toggle-link" id="toggle-link" onclick="switchTab('signup')">Sign up free</button>
    </div>

  </div><!-- /scroll-body -->
</div>

<script src="js/api.js"></script>
<script>
  let current = 'login';

  function switchTab(tab) {
    if (tab === current) return;

    const fromPanel = document.getElementById('panel-' + current);
    const toPanel   = document.getElementById('panel-' + tab);
    const fromTab   = document.getElementById('tab-' + current);
    const toTab     = document.getElementById('tab-' + tab);
    const toggleRow = document.getElementById('toggle-row');
    const toggleLink = document.getElementById('toggle-link');

    // Slide old panel out
    fromPanel.classList.remove('active');
    fromPanel.classList.add('exit-left');
    setTimeout(() => fromPanel.classList.remove('exit-left'), 300);

    // Slide new panel in (from right)
    toPanel.style.transform = 'translateX(32px)';
    toPanel.style.opacity = '0';
    toPanel.classList.add('active');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        toPanel.style.transform = '';
        toPanel.style.opacity = '';
      });
    });

    // Update tabs
    fromTab.classList.remove('active');
    fromTab.setAttribute('aria-selected', 'false');
    toTab.classList.add('active');
    toTab.setAttribute('aria-selected', 'true');

    // Update bottom toggle
    if (tab === 'signup') {
      toggleRow.innerHTML = 'Already have an account? <button class="toggle-link" onclick="switchTab(\'login\')">Sign in</button>';
    } else {
      toggleRow.innerHTML = "Don't have an account? <button class=\"toggle-link\" onclick=\"switchTab('signup')\">Sign up free</button>";
    }

    current = tab;
  }

  function togglePw(inputId, btn) {
    const input = document.getElementById(inputId);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.querySelector('svg').style.opacity = isHidden ? '0.45' : '1';
  }

  async function handleLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl    = document.getElementById('login-error');
    errEl.style.display = 'none';
    if (!email || !password) return shake(document.querySelector('#panel-login .btn-primary'));
    const btn = document.querySelector('#panel-login .btn-primary');
    btn.classList.add('loading');
    try {
      const data = await apiRequest('/api/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password }),
      });
      setToken(data.token);
      localStorage.setItem('lookin_email', email);
      window.location.href = 'index.html';
    } catch (err) {
      errEl.textContent = err.message || 'Sign in failed. Try again.';
      errEl.style.display = 'block';
      btn.classList.remove('loading');
    }
  }

  async function handleSignup() {
    const email    = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const errEl    = document.getElementById('signup-error');
    errEl.style.display = 'none';
    if (!email || !password) return shake(document.querySelector('#panel-signup .btn-primary'));
    if (password.length < 8) {
      errEl.textContent = 'Password must be at least 8 characters.';
      errEl.style.display = 'block';
      return;
    }
    const btn = document.querySelector('#panel-signup .btn-primary');
    btn.classList.add('loading');
    try {
      const data = await apiRequest('/api/auth/signup', {
        method: 'POST',
        body: JSON.stringify({ email, password }),
      });
      setToken(data.token);
      localStorage.setItem('lookin_email', email);
      window.location.href = 'onboarding.html';
    } catch (err) {
      errEl.textContent = err.message || 'Account creation failed. Try again.';
      errEl.style.display = 'block';
      btn.classList.remove('loading');
    }
  }

  function handleGoogle() {
    alert('Google sign-in coming soon.');
  }

  function handleApple() {
    alert('Apple sign-in coming soon.');
  }

  function shake(el) {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'shake 0.4s ease';
    setTimeout(() => el.style.animation = '', 400);
  }

  document.addEventListener('DOMContentLoaded', () => {
    const style = document.createElement('style');
    style.textContent = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20%       { transform: translateX(-6px); }
        40%       { transform: translateX(6px); }
        60%       { transform: translateX(-4px); }
        80%       { transform: translateX(4px); }
      }
    `;
    document.head.appendChild(style);
  });
</script>

</body>
</html>
